[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    auth: Authentication tests
    courses: Course management tests
    enrollments: Enrollment tests
    progress: Progress tracking tests
    slow: Slow running tests